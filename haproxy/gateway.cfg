global
  stats socket /sock/admin.sock user haproxy group haproxy mode 660 level admin
  log stdout format raw local0 info

defaults
  mode http
  log global
  option httplog
  timeout connect      5s
  timeout http-request 10s
  timeout queue        30s
  timeout client       50s
  timeout server       50s

resolvers docker_dns
  nameserver dns1 127.0.0.11:53
  resolve_retries 3
  timeout resolve 1s
  timeout retry   1s
  hold other      30s
  hold refused    30s
  hold nx         30s
  hold timeout    30s
  hold valid      10s
  hold obsolete   30s

frontend fe_main
  bind :80
  default_backend blue_green

backend blue_green
  option httpchk GET /app/health
  http-check expect status 200
  balance roundrobin

  default-server check resolvers docker_dns init-addr none inter 2s fall 3 rise 2
  server blue blue_nginx:80
  server green green_nginx:80